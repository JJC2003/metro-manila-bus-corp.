<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MMBC - Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:400;700&family=Lato:400;700&family=Poppins:400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(122deg, #e1f1ff 0%, #67aaf9 100%);
            --menu-card-bg: rgba(255,255,255,0.92);
            --menu-card-border: #dce6f8;
            --menu-card-shadow: 0 6px 28px #3965ff0f;
            --menu-title: #3965ff;
            --menu-text: #213253;
            --menu-icon: #3965ff;
            --menu-divider: #e2e8f0;
            --bottomnav-bg: rgba(255,255,255,0.96);
            --bottomnav-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        html[data-theme="dark"] {
            --bg: radial-gradient(circle at top, #020617 0%, #020617 40%, #020617 100%);
            --menu-card-bg: rgba(15,23,42,0.98);
            --menu-card-border: #1f2937;
            --menu-card-shadow: 0 18px 40px rgba(0,0,0,0.85);
            --menu-title: #60a5ff;
            --menu-text: #e5e7eb;
            --menu-icon: #60a5ff;
            --menu-divider: #1f2937;
            --bottomnav-bg: rgba(15,23,42,0.98);
            --bottomnav-shadow: 0 -10px 30px rgba(0,0,0,0.9);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', 'Lato', 'Poppins', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            line-height: 1.6;
            margin: 0;
            overflow-x: hidden;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .container {
            max-width: 450px;
            margin: 40px auto 0;
            padding: 15px;
        }

        .menu-card {
            background: var(--menu-card-bg);
            border-radius: 20px;
            padding: 36px;
            box-shadow: var(--menu-card-shadow);
            border: 1px solid var(--menu-card-border);
            margin-bottom: 20px;
            color: var(--menu-text);
            transition: background 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
        }

        .menu-card h2 {
            color: var(--menu-title);
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            font-family: 'Poppins', 'DM Sans';
            font-weight: 900;
            letter-spacing: .05rem;
            text-align: center;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--menu-divider);
            cursor: pointer;
            transition: .18s;
            font-family: 'DM Sans', 'Lato';
            font-size: 1.1rem;
            color: var(--menu-text);
            font-weight: 700;
        }

        .menu-item:hover {
            background: rgba(57,101,255,.08);
            border-radius: 10px;
            padding-left: 10px;
            margin: 0 -10px;
        }

        html[data-theme="dark"] .menu-item:hover {
            background: rgba(37,99,235,0.26);
        }

        .menu-item i {
            color: var(--menu-icon);
            font-size: 1.5rem;
            margin-right: 15px;
            width: 30px;
        }

        .menu-item span {
            flex: 1;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bottomnav-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: var(--bottomnav-shadow);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.7rem;
            flex: 1;
        }

        .nav-item i {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #3965ff;
        }

        .theme-toggle-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 120;
            border-radius: 999px;
            border: 1px solid rgba(226,232,240,0.65);
            background: rgba(15,23,42,0.12);
            color: #0f172a;
            padding: 6px 11px;
            font-size: 0.78rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        html[data-theme="dark"] .theme-toggle-btn {
            border-color: rgba(148,163,184,0.8);
            background: rgba(15,23,42,0.7);
            color: #f9fafb;
        }

        .theme-toggle-btn i {
            font-size: 0.9rem;
        }

        @media(max-width:768px){
            .menu-card{
                margin: 0 16px 0;
                padding: 26px 8px;
            }
            .container{
                margin-top: 24px;
            }
        }
    </style>
</head>
<body>

<button class="theme-toggle-btn" data-theme-toggle-btn type="button">
    <i class="fas fa-moon" data-theme-icon></i>
    <span data-theme-label>Dark</span>
</button>

<div class="container">
    <div class="menu-card">
        <h2>Menu</h2>
        <ul class="menu-list">
            <li class="menu-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </li>
            <li class="menu-item" onclick="window.location.href='settings.html'">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </li>
            <li class="menu-item" onclick="window.location.href='rates.html'">
                <i class="fas fa-dollar-sign"></i>
                <span>Rates</span>
            </li>
            <li class="menu-item" onclick="window.location.href='help.html'">
                <i class="fas fa-question-circle"></i>
                <span>Help & Support</span>
            </li>
            <li class="menu-item" onclick="window.location.href='about.html'">
                <i class="fas fa-info-circle"></i>
                <span>About</span>
            </li>
            <li class="menu-item" onclick="window.location.href='index.html'">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </li>
        </ul>
    </div>
</div>

<nav class="bottom-nav">
    <a href="main.html" class="nav-item">
        <i class="fas fa-house"></i>
        Home
    </a>
    <a href="live-gps.html" class="nav-item">
        <i class="fas fa-paper-plane"></i>
        Track
    </a>
    <a href="profile.html" class="nav-item">
        <i class="fas fa-user"></i>
        Profile
    </a>
    <a href="#" class="nav-item active">
        <i class="fas fa-bars"></i>
        Menu
    </a>
</nav>

<script>
  (function() {
    const htmlEl = document.documentElement;
    const stored = localStorage.getItem('mmbc-theme');
    const prefersDark = window.matchMedia &&
      window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (stored === 'dark' || stored === 'light') {
      htmlEl.setAttribute('data-theme', stored);
    } else {
      htmlEl.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }

    function setTheme(next) {
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('mmbc-theme', next);
    }

    function toggleTheme() {
      const current = htmlEl.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      setTheme(next);
      syncThemeControls();
    }

    function syncThemeControls() {
      const current = htmlEl.getAttribute('data-theme') || 'light';

      document.querySelectorAll('[data-theme-toggle-btn]').forEach(btn => {
        const icon = btn.querySelector('[data-theme-icon]');
        const label = btn.querySelector('[data-theme-label]');
        if (icon) icon.className = current === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        if (label) label.textContent = current === 'dark' ? 'Light' : 'Dark';
      });

      document.querySelectorAll('input[type="checkbox"][data-theme-toggle]').forEach(cb => {
        cb.checked = current === 'dark';
      });
    }

    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-theme-toggle-btn]');
      if (btn) toggleTheme();
    });

    document.addEventListener('change', function(e) {
      const cb = e.target;
      if (cb.matches('input[type="checkbox"][data-theme-toggle]')) {
        toggleTheme();
      }
    });

    syncThemeControls();
  })();
</script>

</body>
</html>
