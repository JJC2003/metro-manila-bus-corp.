<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMBC.Bus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #176BFF;
            --secondary: #2F9BFF;
            --accent: #FFC94A;
            --dark: #111827;
            --muted: #4B5563;
            --bg-gradient: linear-gradient(135deg, #eaf6ff 0%, #e0e5ff 100%);
            --white: #ffffff;
            --shadow-soft: 0 14px 30px rgba(15, 23, 42, 0.08);
            --shadow-light: 0 8px 20px rgba(15, 23, 42, 0.06);
            --radius-lg: 24px;
            --radius-md: 16px;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #16A34A;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--dark);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('backgrounds/mmbc3.jpg') center/cover no-repeat fixed;
            opacity: 0.06;
            filter: blur(1px);
            pointer-events: none;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(23, 107, 255, 0.16), transparent 55%);
            z-index: -1;
            pointer-events: none;
        }

        .main-header {
            background: linear-gradient(90deg, #1c4980 0%, #3ea6ff 120%);
            color: #fff;
            text-align: center;
            padding: 22px 0 18px 0;
            position: sticky;
            top: 0;
            z-index: 20;
            box-shadow: 0 4px 24px rgba(32,50,84,0.18);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .main-header-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-logo-icon {
            background: rgba(255,255,255,0.18);
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffeb99;
            box-shadow: 0 4px 12px rgba(15,23,42,0.25);
        }

        .header-logo-icon i {
            font-size: 1.1rem;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .header-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.35rem;
            font-weight: 900;
            letter-spacing: 0.12em;
        }

        .header-sub {
            font-size: 0.78rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #e5efff;
        }

        #notification-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            width: auto;
            pointer-events: none;
        }

        .toast {
            background: #111827;
            color: #e5e7eb;
            padding: 10px 18px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 25px rgba(15,23,42,0.35);
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            border-left: 4px solid var(--danger);
            font-weight: 500;
            font-size: 0.85rem;
            white-space: nowrap;
            pointer-events: auto;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.warn { border-left-color: var(--warning); }
        .toast.success { border-left-color: var(--success); }
        .toast i { font-size: 0.95rem; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        .shake { animation: shake 0.2s ease-in-out; }

        .page-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 26px 16px 32px;
        }

        .glass-container {
            background: rgba(255,255,255,0.93);
            width: 100%;
            max-width: 420px;
            padding: 24px 22px 26px;
            border-radius: var(--radius-lg);
            border: 1px solid #E2ECFF;
            box-shadow: 0 6px 28px rgba(10,179,255,0.09);
            text-align: center;
            color: var(--dark);
            position: relative;
            z-index: 1;
        }

        .glass-container::before {
            content: "";
            position: absolute;
            right: -35px;
            top: -35px;
            width: 110px;
            height: 110px;
            background: rgba(23,107,255,0.08);
            border-radius: 50%;
        }

        .brand-header {
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .bus-logo {
            background: url('bus.png') no-repeat center center;
            background-size: contain;
            width: 80px;
            height: 60px;
            margin: 0 auto 6px auto;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 0.16em;
            color: var(--dark);
        }

        .dot { color: var(--accent); }

        .view-title {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 6px;
            margin-bottom: 14px;
        }

        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 4px;
            padding-left: 2px;
        }

        .input-wrapper {
            background: transparent;
            border-radius: 0;
            display: flex;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1.5px solid #CBD5F5;
            transition: border-color 0.2s ease, transform 0.1s ease;
        }

        .input-wrapper:focus-within {
            border-bottom-color: var(--primary);
            transform: translateY(-1px);
        }

        .input-wrapper i {
            color: #4B5563;
            margin-right: 8px;
            width: 18px;
            text-align: center;
            font-size: 0.9rem;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--dark);
            width: 100%;
            font-size: 0.9rem;
            padding: 3px 0 2px 0;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper input::placeholder {
            color: #9CA3AF;
        }

        .toggle-password {
            margin-right: 0 !important;
            margin-left: 6px;
            cursor: pointer;
            color: #9CA3AF !important;
            font-size: 0.85rem;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #176BFF, #2F9BFF);
            color: #F9FAFB;
            border: none;
            padding: 11px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
            margin-top: 4px;
            box-shadow: 0 10px 20px rgba(23, 107, 255, 0.45);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 22px rgba(23, 107, 255, 0.5);
            filter: brightness(1.02);
        }

        .btn-primary:active {
            transform: translateY(1px);
            box-shadow: 0 6px 12px rgba(23, 107, 255, 0.4);
            filter: brightness(0.98);
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .flex-row input[type="checkbox"] {
            accent-color: var(--primary);
        }

        .link-text {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.15s ease;
            display: inline-block;
            font-size: 0.8rem;
        }

        .link-text:hover {
            color: #0B5AD9;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .footer-text {
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .auth-view {
            display: none;
        }
        .auth-view.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 380px) {
            body { font-size: 15px; }
            .glass-container { padding: 22px 18px 24px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="main-header">
    <div class="main-header-inner">
        <div class="header-logo-icon"><i class="fas fa-bus"></i></div>
        <div class="header-text">
            <div class="header-title">MMBC.BUS</div>
            <div class="header-sub">Sign in</div>
        </div>
    </div>
</div>

<div id="notification-container">
    <div id="toast" class="toast">
        <i id="toastIcon" class="fas fa-exclamation-circle"></i>
        <span id="toastMsg">Message here</span>
    </div>
</div>

<div class="page-wrap">
    <div class="glass-container" id="authCard">
        <div class="brand-header">
            <div class="bus-logo"></div>
            <h1>MMBC<span class="dot">.</span>BUS</h1>
            <p class="view-title">Sign in to manage your bus trips comfortably.</p>
        </div>

        <div id="loginView" class="auth-view active">
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailInput" placeholder="email@example.com">
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="••••••••">
                    <i class="fas fa-eye toggle-password" id="eyeIcon" onclick="togglePass('loginPass', 'eyeIcon')"></i>
                </div>
            </div>
            <div class="flex-row">
                <label style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox"> Remember me
                </label>
                <a class="link-text" onclick="showView('forgot')">Forgot Password?</a>
            </div>
            <button class="btn-primary" onclick="handleLogin()">LOG IN</button>
            <div class="footer-text">
                Don't have an account?
                <a class="link-text" style="margin-left: 4px;" onclick="showView('signup')">Sign Up</a>
            </div>
        </div>

        <div id="forgotView" class="auth-view">
            <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 18px;">
                Enter your email to reset your password.
            </p>
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-paper-plane"></i>
                    <input type="email" placeholder="email@example.com">
                </div>
            </div>
            <button class="btn-primary">SEND RESET LINK</button>
            <div class="footer-text">
                <a class="link-text" onclick="showView('login')">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>

        <div id="signupView" class="auth-view">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="First Name">
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Last Name">
                    </div>
                </div>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPass" placeholder="Password">
                    <i class="fas fa-eye toggle-password" id="eyeIconReg" onclick="togglePass('regPass', 'eyeIconReg')"></i>
                </div>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email">
                </div>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-phone"></i>
                    <input type="tel" placeholder="Mobile">
                </div>
            </div>
            <div class="input-group">
                <div style="display:grid; grid-template-columns: 1fr auto; gap:10px;">
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="text" placeholder="Code">
                    </div>
                    <button style="background:#E5EDFF; border:none; padding:0 16px; border-radius:999px; font-weight:600; cursor:pointer; font-size: 0.8rem; color:#1F2933;">
                        Send
                    </button>
                </div>
            </div>
            <button class="btn-primary">CREATE ACCOUNT</button>
            <div class="footer-text">
                Already have an account?
                <a class="link-text" style="margin-left: 4px;" onclick="showView('login')">Sign In</a>
            </div>
        </div>
    </div>
</div>

<script>
    function showView(viewName) {
        document.querySelectorAll('.auth-view').forEach(view => view.classList.remove('active'));
        document.getElementById(viewName + 'View').classList.add('active');
    }

    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function triggerToast(msg, type = 'error') {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const toastIcon = document.getElementById('toastIcon');
        const card = document.getElementById('authCard');

        toastMsg.innerText = msg;
        toast.classList.remove('warn', 'success');

        if (type === 'warn') {
            toast.classList.add('warn');
            toastIcon.className = 'fas fa-exclamation-triangle';
            card.classList.add('shake');
        } else if (type === 'success') {
            toast.classList.add('success');
            toastIcon.className = 'fas fa-check-circle';
        } else {
            toastIcon.className = 'fas fa-exclamation-circle';
            card.classList.add('shake');
        }

        toast.classList.add('show');

        setTimeout(() => { toast.classList.remove('show'); }, 3000);
        setTimeout(() => { card.classList.remove('shake'); }, 300);
    }

    function handleLogin() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('loginPass').value;

        if (!email || !pass) {
            triggerToast("Enter email and password first!", "warn");
            return;
        }

        if (email === "user@gmail.com" && pass === "123") {
            triggerToast("Login Successful!", "success");
            setTimeout(() => { window.location.href = "main.html"; }, 2000);
        } else {
            triggerToast("No account found with this email.", "error");
        }
    }
</script>

</body>
</html>
