<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMBC Live GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:400;700&family=Lato:400;700&family=Poppins:400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        :root {
            --primary-blue: #0078ff;
            --accent-blue: #00bfff;
            --dark-navy: #001f3f;
            --glass-white: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --bg-main: radial-gradient(circle at 20% 20%, #004e92, var(--dark-navy));
            --header-banner-bg: linear-gradient(90deg, var(--primary-blue), var(--accent-blue));
            --top-section-bg: #00122e;
            --search-bg: rgba(255,255,255,0.1);
            --search-border: rgba(255,255,255,0.2);
            --bottomnav-bg: rgba(255,255,255,1);
            --bottomnav-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            --nav-icon-inactive: #aaaaaa;
            --nav-icon-active: #1877ff;
        }

        html[data-theme="dark"] {
            --primary-blue: #60a5ff;
            --accent-blue: #38bdf8;
            --dark-navy: #020617;
            --glass-white: rgba(15, 23, 42, 0.8);
            --text-main: #e5e7eb;
            --bg-main: radial-gradient(circle at 20% 20%, #020617, #020617);
            --header-banner-bg: linear-gradient(90deg, #020617, #111827);
            --top-section-bg: #020617;
            --search-bg: rgba(15,23,42,0.9);
            --search-border: rgba(148,163,184,0.6);
            --bottomnav-bg: rgba(15,23,42,0.98);
            --bottomnav-shadow: 0 -10px 30px rgba(0,0,0,0.9);
            --nav-icon-inactive: #6b7280;
            --nav-icon-active: #60a5ff;
        }

        body {
            margin: 0;
            font-family: 'DM Sans', 'Lato', 'Poppins', Arial, sans-serif;
            color: var(--text-main);
            background: var(--bg-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle { position: absolute; background: rgba(0, 136, 255, 0.5); border-radius: 50%; animation: float 10s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-80px) scale(1.3); opacity: 0.4; }
        }

        .theme-toggle-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 200;
            border-radius: 999px;
            border: 1px solid rgba(226,232,240,0.65);
            background: rgba(15,23,42,0.12);
            color: #f9fafb;
            padding: 6px 11px;
            font-size: 0.78rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        html[data-theme="dark"] .theme-toggle-btn {
            border-color: rgba(148,163,184,0.8);
            background: rgba(15,23,42,0.7);
            color: #f9fafb;
        }

        .theme-toggle-btn i {
            font-size: 0.9rem;
        }

        header {
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .header-banner {
            text-align: center;
            padding: 12px;
            font-size: 1.4em;
            font-weight: 600;
            background: var(--header-banner-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #top-section {
            width: 100%;
            background: var(--top-section-bg);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            box-sizing: border-box;
            border-bottom: 2px solid var(--accent-blue);
            z-index: 90;
        }

        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-area { flex: 1; }

        .search-bar-container {
            display: flex;
            align-items: center;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 10px;
            overflow: hidden;
            height: 45px;
        }

        .search-bar-container input {
            flex: 1;
            padding: 0 15px;
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }

        .search-bar-container input::placeholder {
            color: rgba(226,232,240,0.7);
        }

        .search-submit-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 20px;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        #map {
            flex: 1;
            width: 100%;
            background: #f0f0f0;
            z-index: 1;
        }

        #busList {
            display: flex; gap: 12px; overflow-x: auto; padding: 10px 0 5px 0;
        }
        #busList::-webkit-scrollbar { height: 5px; }
        #busList::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }

        .bus-card {
            min-width: 200px;
            background: var(--glass-white); padding: 12px; border-radius: 12px;
            transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .bus-card:hover { background: rgba(0,136,255,0.3); border-color: var(--accent-blue); }
        .bus-card h4 { margin: 0 0 5px; color: var(--accent-blue); font-size: 0.9rem; }

        .distance-box {
            background: rgba(0, 120, 255, 0.25); border: 1px solid var(--accent-blue);
            padding: 8px 12px; border-radius: 10px; text-align: center;
            font-size: 0.8rem; margin-top: 10px;
        }

        .bottom-nav {
            position: relative;
            background: var(--bottomnav-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: var(--bottomnav-shadow);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            color: var(--nav-icon-inactive);
            text-decoration: none;
            font-size: 0.7rem;
            flex: 1;
        }

        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--nav-icon-active); }
        .nav-item.active i { color: var(--nav-icon-active); }

        .glow { text-shadow: 0 0 10px var(--accent-blue); }
    </style>
</head>
<body>

<button class="theme-toggle-btn" data-theme-toggle-btn type="button">
    <i class="fas fa-moon" data-theme-icon></i>
    <span data-theme-label>Dark</span>
</button>

<div class="particles" id="particles"></div>

<header>
    <div class="header-banner">
        🚌 <span class="glow">MMBC Live GPS Tracker</span>
    </div>
    
    <div id="top-section">
        <div class="controls-wrapper">
            <div class="search-area">
                <div class="search-bar-container">
                    <input type="text" id="searchInput" placeholder="Bus # or Destination..." onkeydown="if(event.key==='Enter') searchBus()">
                    <button class="search-submit-btn" onclick="searchBus()">Search</button>
                </div>
            </div>
        </div>

        <div id="distanceBox" class="distance-box" style="display:none;"></div>
        <div id="busList"></div>
    </div>
</header>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="main.html" class="nav-item">
        <i class="fas fa-house"></i>
        Home
    </a>
    <a href="#" class="nav-item active">
        <i class="fas fa-paper-plane"></i>
        Track
    </a>
    <a href="profile.html" class="nav-item">
        <i class="fas fa-user"></i>
        Profile
    </a>
    <a href="menu.html" class="nav-item">
        <i class="fas fa-bars"></i>
        Menu
    </a>
</nav>

<script>
    const particles = document.getElementById("particles");
    for (let i = 0; i < 20; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.width = p.style.height = `${Math.random() * 8 + 4}px`;
        p.style.left = `${Math.random() * 100}%`;
        p.style.top = `${Math.random() * 100}%`;
        p.style.animationDuration = `${Math.random() * 5 + 5}s`;
        particles.appendChild(p);
    }

    const map = L.map('map').setView([14.5995, 120.9842], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let busMarkers = {};
    let allBuses = [];
    let selectedBus = null;
    let userMarker = null;

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    async function updateBusLocations() {
        try {
            const res = await fetch('get_bus_locations.php');
            const buses = await res.json();
            allBuses = buses;

            buses.forEach(bus => {
                if (busMarkers[bus.bus_id] || (selectedBus && selectedBus.bus_id === bus.bus_id)) {
                    moveBus(bus);
                }
            });

            if (selectedBus) {
                let bus = buses.find(b => b.bus_id === selectedBus.bus_id);
                if (bus) showDistance(bus);
            }
        } catch (err) { console.error("Update Error:", err); }
    }

    function moveBus(bus) {
        const latLng = [parseFloat(bus.latitude), parseFloat(bus.longitude)];
        if (busMarkers[bus.bus_id]) {
            busMarkers[bus.bus_id].setLatLng(latLng);
        } else {
            const icon = L.icon({ 
                iconUrl: 'backgrounds/search.png', 
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20]
            });
            const marker = L.marker(latLng, { icon })
                .addTo(map)
                .bindPopup(`<b>Bus ${bus.bus_number}</b><br>${bus.destination}`);
            busMarkers[bus.bus_id] = marker;
        }
    }

    function searchBus() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const busList = document.getElementById('busList');
        busList.innerHTML = '';

        const filtered = allBuses.filter(b => 
            b.bus_number.toLowerCase().includes(query) || 
            b.destination.toLowerCase().includes(query)
        );

        filtered.forEach(bus => {
            const div = document.createElement('div');
            div.className = 'bus-card';
            div.innerHTML = `
                <h4>Bus ${bus.bus_number}</h4>
                <div class="bus-info">📍 ${bus.destination} <br>Status: ${bus.status}</div>
            `;
            div.onclick = () => {
                selectedBus = bus;
                Object.keys(busMarkers).forEach(id => {
                    if(id !== bus.bus_id) { map.removeLayer(busMarkers[id]); delete busMarkers[id]; }
                });
                moveBus(bus);
                map.flyTo([bus.latitude, bus.longitude], 15);
                showDistance(bus);
            };
            busList.appendChild(div);
        });
    }

    function showDistance(bus) {
        const distanceBox = document.getElementById('distanceBox');
        let dist, text;
        if (userMarker) {
            const userPos = userMarker.getLatLng();
            dist = haversine(userPos.lat, userPos.lng, bus.latitude, bus.longitude);
            text = "To You";
        } else {
            dist = haversine(bus.latitude, bus.longitude, bus.destination_lat, bus.destination_lng);
            text = `To ${bus.destination}`;
        }
        const eta = (dist / (bus.speed > 5 ? bus.speed : 30)) * 60;
        distanceBox.style.display = 'block';
        distanceBox.innerHTML = `🧭 ${text}: <b>${dist.toFixed(2)} km</b> | ⏱️ ETA: ~${Math.round(eta)} mins`;
    }

    function trackUser() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude; const lng = pos.coords.longitude;
                if (!userMarker) {
                    const locatorIcon = L.icon({ iconUrl: 'backgrounds/locator.png', iconSize: [35, 35] });
                    userMarker = L.marker([lat, lng], { icon: locatorIcon }).addTo(map).bindPopup("You are here");
                } else { userMarker.setLatLng([lat, lng]); }
            }, null, { enableHighAccuracy: true });
        }
    }

    trackUser();
    updateBusLocations();
    setInterval(updateBusLocations, 5000);
</script>

<script>
  (function() {
    const htmlEl = document.documentElement;
    const stored = localStorage.getItem('mmbc-theme');
    const prefersDark = window.matchMedia &&
      window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (stored === 'dark' || stored === 'light') {
      htmlEl.setAttribute('data-theme', stored);
    } else {
      htmlEl.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }

    function setTheme(next) {
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('mmbc-theme', next);
    }

    function toggleTheme() {
      const current = htmlEl.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      setTheme(next);
      syncThemeControls();
    }

    function syncThemeControls() {
      const current = htmlEl.getAttribute('data-theme') || 'light';

      document.querySelectorAll('[data-theme-toggle-btn]').forEach(btn => {
        const icon = btn.querySelector('[data-theme-icon]');
        const label = btn.querySelector('[data-theme-label]');
        if (icon) icon.className = current === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        if (label) label.textContent = current === 'dark' ? 'Light' : 'Dark';
      });

      document.querySelectorAll('input[type="checkbox"][data-theme-toggle]').forEach(cb => {
        cb.checked = current === 'dark';
      });
    }

    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-theme-toggle-btn]');
      if (btn) toggleTheme();
    });

    document.addEventListener('change', function(e) {
      const cb = e.target;
      if (cb.matches('input[type="checkbox"][data-theme-toggle]')) {
        toggleTheme();
      }
    });

    syncThemeControls();
  })();
</script>

</body>
</html>
